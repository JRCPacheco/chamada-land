<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://chamadafacil-api.local http://127.0.0.1:5500 http://localhost:5500 https://api.chamadafacil.net.br https://pro.chamadafacil.net.br;">
    <title>Acesso Pro | Chamada Fácil</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #14315D;
            --primary-light: #1c4481;
            --secondary: #6ABF57;
            --bg-gradient: linear-gradient(135deg, #14315D 0%, #0A6B7C 100%);
            --white: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(226, 232, 240, 0.8);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #173b78;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 72% center;
            filter: blur(0.6px);
            z-index: -2;
            transform: scale(1.02);
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,rgba(20,49,93,0.97) 0%,rgba(20,49,93,0.945) 38%,rgba(10,107,124,0.84) 66%,rgba(10,107,124,0.58) 100%);
            z-index: -1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 56px;
            height: 56px;
            margin-bottom: 0.75rem;
        }

        .logo-text {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.04em;
            color: var(--primary);
        }
        .logo-text span { color: var(--secondary); }

        /* Role Switcher */
        .switcher {
            background: #f1f5f9;
            padding: 0.35rem;
            border-radius: 1rem;
            display: flex;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .switcher-btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            cursor: pointer;
            z-index: 1;
            transition: var(--transition);
        }

        .switcher-btn.active {
            color: var(--primary);
        }

        .switcher-indicator {
            position: absolute;
            height: calc(100% - 0.7rem);
            width: calc(50% - 0.35rem);
            background: var(--white);
            border-radius: 0.75rem;
            top: 0.35rem;
            left: 0.35rem;
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .switcher-btn:nth-child(2).active ~ .switcher-indicator {
            transform: translateX(100%);
        }

        /* Forms */
        .forms-wrapper {
            display: grid;
        }

        .form-container {
            grid-area: 1 / 1;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(10px) scale(0.98);
        }

        .form-container.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            transition: var(--transition);
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(13, 45, 99, 0.08);
        }

        .toggle-pass {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(13, 45, 99, 0.3);
        }

        /* Google Button */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider::before { margin-right: 1rem; }
        .divider::after { margin-left: 1rem; }

        .btn-google {
            width: 100%;
            padding: 0.875rem;
            background: var(--white);
            color: #374151;
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.9375rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .footer-links {
            margin-top: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .footer-links a {
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--primary);
        }

        .back-to-portal {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary) !important;
            font-weight: 600 !important;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 1.5rem;
            }
            .logo-text { font-size: 1.25rem; }
        }
    </style>
</head>
<body>
    <img src="assets/hero_sala.webp" alt="Background" class="bg-image">
    <div class="bg-overlay"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="assets/logo1024.svg" alt="Logo Chamada Fácil" class="logo-img">
            <h1 class="logo-text">Chamada<span>Fácil</span> PRO</h1>
        </div>

        <div class="switcher">
            <button class="switcher-btn active" onclick="switchMode('professor')">Professor</button>
            <button class="switcher-btn" onclick="switchMode('escola')">Escola</button>
            <div class="switcher-indicator" id="indicator"></div>
        </div>

        <div class="forms-wrapper">
            <!-- Professor Form -->
            <div id="professor-form" class="form-container active">
                <button class="btn-google" type="button" onclick="window.location.href='https://portal-professor.chamadafacil.net.br/'">
                    <img src="assets/google_2025.svg" alt="">
                    Entrar com Google
                </button>

                <div class="divider">ou use seu e-mail</div>

                <p style="margin:-0.5rem 0 1.25rem; font-size:0.8125rem; color: var(--text-muted); text-align:center;">Acesso do professor em modo de testes. Google e painel levam ao mesmo portal nesta fase.</p>

                <form onsubmit="return goToPortal('professor', event)">
                    <div class="input-group">
                        <label for="prof-email">E-mail</label>
                        <input type="email" id="prof-email" placeholder="professor@exemplo.com.br">
                    </div>
                    <div class="input-group">
                        <label for="prof-pass">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="prof-pass" placeholder="••••••••">
                            <button type="button" class="toggle-pass" onclick="togglePassword('prof-pass')">VER</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Acessar Painel</button>
                </form>
            </div>

            <!-- School Form -->
            <div id="escola-form" class="form-container">
                <form id="school-login-form">
                    <div class="input-group">
                        <label for="esc-user">Usuário ou E-mail</label>
                        <input type="text" id="esc-user" placeholder="gestor_escola" required>
                    </div>
                    <div class="input-group">
                        <label for="esc-pass">Senha</label>
                        <div class="input-wrapper">
                            <input type="password" id="esc-pass" placeholder="••••••••" required>
                            <button type="button" class="toggle-pass" onclick="togglePassword('esc-pass')">VER</button>
                        </div>
                    </div>
                    <button id="school-submit-btn" type="submit" class="btn-submit">Acessar Gestão</button>
                </form>
                <p id="school-login-message" style="margin-top:1rem; min-height:1.25rem; font-size:0.8125rem; text-align:center; color: var(--text-muted);"></p>
            </div>
        </div>

        <div class="footer-links">
            <a href="#">Esqueci minha senha</a>
            <a href="index.html" class="back-to-site">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Voltar para o site
            </a>
        </div>
    </div>

    <script>
        const API_BASE = resolveApiBase();
        const SCHOOL_STORAGE_KEY = 'cf_portal_school_auth';

        function resolveApiBase() {
            const params = new URLSearchParams(window.location.search);
            const override = params.get('apiBase') || localStorage.getItem('cf_api_base_override');
            if (override) return override.replace(/\/$/, '');

            const host = window.location.hostname;
            if (host === 'localhost' || host === '127.0.0.1') {
                return 'http://chamadafacil-api.local';
            }

            return window.location.origin + '/api';
        }

        function switchMode(mode) {
            const profBtn = document.querySelectorAll('.switcher-btn')[0];
            const escBtn = document.querySelectorAll('.switcher-btn')[1];
            const profForm = document.getElementById('professor-form');
            const escForm = document.getElementById('escola-form');

            if (mode === 'professor') {
                profBtn.classList.add('active');
                escBtn.classList.remove('active');
                profForm.classList.add('active');
                escForm.classList.remove('active');
            } else {
                profBtn.classList.remove('active');
                escBtn.classList.add('active');
                profForm.classList.remove('active');
                escForm.classList.add('active');
            }
        }

        function togglePassword(id) {
            const input = document.getElementById(id);
            const btn = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'OCULTAR';
            } else {
                input.type = 'password';
                btn.textContent = 'VER';
            }
        }

        function setSchoolMessage(text, type = 'info') {
            const el = document.getElementById('school-login-message');
            if (!el) return;
            const colors = {
                info: 'var(--text-muted)',
                success: 'var(--secondary)',
                error: '#b91c1c'
            };
            el.textContent = text;
            el.style.color = colors[type] || colors.info;
            el.style.fontWeight = text ? '600' : '400';
        }

        async function apiRequest(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, {
                method: options.method || 'GET',
                headers: {
                    Accept: 'application/json',
                    ...(options.body ? { 'Content-Type': 'application/json' } : {})
                },
                body: options.body ? JSON.stringify(options.body) : undefined
            });

            const data = await response.json().catch(() => ({}));
            if (!response.ok) {
                throw new Error(data?.message || data?.error || `HTTP ${response.status}`);
            }
            return data;
        }

        function goToPortal(mode, event) {
            if (event) event.preventDefault();

            if (mode === 'professor') {
                const email = document.getElementById('prof-email').value.trim();
                const target = new URL('https://portal-professor.chamadafacil.net.br/');
                if (email) target.searchParams.set('email', email);
                window.location.href = target.toString();
                return false;
            }

            return false;
        }

        async function loginSchool(event) {
            event.preventDefault();
            const identifier = document.getElementById('esc-user').value.trim();
            const password = document.getElementById('esc-pass').value;
            const submitButton = document.getElementById('school-submit-btn');

            if (!identifier || !password) {
                setSchoolMessage('Informe usuário e senha para continuar.', 'error');
                return;
            }

            try {
                setSchoolMessage('Validando acesso institucional...', 'info');
                submitButton.disabled = true;
                submitButton.textContent = 'Validando...';

                const payload = await apiRequest('/auth/dev-school-login', {
                    method: 'POST',
                    body: {
                        identifier,
                        password,
                        organization_name: 'Escola Dev Chamada Fácil',
                        role: 'manager'
                    }
                });

                localStorage.setItem(SCHOOL_STORAGE_KEY, JSON.stringify({
                    token: payload.token || '',
                    user: payload.user || null,
                    organization: payload.organization || null,
                    membership: payload.membership || null,
                    subscription: payload.subscription || null
                }));

                setSchoolMessage(`Acesso liberado para ${payload.organization?.name || 'a escola'}. Redirecionando...`, 'success');
                const target = new URL('https://portal-escola.chamadafacil.net.br/');
                target.searchParams.set('user', identifier);
                window.location.href = target.toString();
            } catch (error) {
                setSchoolMessage(error.message || 'Não foi possível autenticar o acesso institucional.', 'error');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Acessar Gestão';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode') || urlParams.get('env');
            const hintedUser = urlParams.get('user') || '';
            document.getElementById('esc-user').value = hintedUser;

            if (mode === 'escola') {
                switchMode('escola');
            } else {
                switchMode('professor');
            }

            document.getElementById('school-login-form').addEventListener('submit', loginSchool);
        });
    </script>
</body>
</html>
