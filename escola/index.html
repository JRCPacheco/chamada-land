<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>Em Desenvolvimento | Chamada Fácil Pro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d2d63;
            --text-muted: #64748b;
            --bg-body: #f8f9fa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 2.25rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--text-muted);
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }
        .badge {
            display: inline-block;
            background: #ffe4e6;
            color: #e11d48;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
        }
        .btn-back {
            display: inline-block;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 1rem;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(13, 45, 99, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Em desenvolvimento</div>
        <h1>Gestão Institucional</h1>
        <p>Estamos preparando um painel completo para gestão de métricas, controle de equipe e administração escolar de alto nível. Disponível em breve para usuários Pro.</p>
        <a href="../index.html" class="btn-back">Voltar ao Site</a>
    </div>
</body>
</html>
